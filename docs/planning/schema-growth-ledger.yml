# schema-growth-ledger.yml — the A-2 schema-growth ledger (canonical plan §11).
#
# Q-0219 second-consumer rule, mechanically enforced: every field added to the
# manifest grammar's declaration schema mints a same-PR entry here — the field,
# the >=2 consuming manifest paths, and the rejected tier-3 alternative.
# tools/check_schema_growth.py diffs the grammar's registered field set
# (sb.spec.roles.snapshot_field_roles) against this ledger: a registered field
# with no entry, or an entry with <2 consumers, fails the build
# (enforce-don't-exhort, Q-0132).
#
# `baseline` lists the K2-seed fields (frozen at design-spec §2.1 BEFORE the
# A-2 rule armed) — exempt from the second-consumer requirement. Every field
# registered AFTER the seed goes in `entries`.
version: 1

baseline:
  - SubsystemManifest.key
  - SubsystemManifest.version
  - SubsystemManifest.commands
  - SubsystemManifest.panels
  - SubsystemManifest.settings
  - SubsystemManifest.stores
  - SubsystemManifest.events
  - SubsystemManifest.capabilities

# Post-seed additions. Entry shape:
#   TypeName.field:
#     consumers: [sb/manifest/economy.py, sb/manifest/inventory.py]  # >=2 REQUIRED
#     rejected_alternative: "tier-3 handler in domain/economy/ui/"
#     minted: 2026-07-DD
# S5 (K4) note: EventSpec/FieldSpec (spec 08 s3.1) and the version-extended
# StoreSpec (spec 09 s3.2) are KERNEL-consumed grammar - consumers below name
# the kernel/tools modules that read each field until the port bands mint the
# first sb/manifest/ declarations (each field is then re-cited from its
# manifests).
entries:
  EventSpec.name:
    consumers: [sb/kernel/outbox/enqueue.py, tools/manifest_compile.py]
    rejected_alternative: "bare event-name strings in the events facet (no schema, no fence input)"
    minted: 2026-07-08
  EventSpec.payload_schema:
    consumers: [sb/kernel/outbox/enqueue.py, sb/spec/events.py]
    rejected_alternative: "unchecked **kwargs (the shipped bus splat with no declared superset)"
    minted: 2026-07-08
  EventSpec.owner_subsystem:
    consumers: [sb/kernel/outbox/enqueue.py, tools/manifest_compile.py]
    rejected_alternative: "deriving ownership from the emitting module path at runtime"
    minted: 2026-07-08
  EventSpec.expected_subscribers:
    consumers: [tools/manifest_compile.py, sb/kernel/outbox/relay.py]
    rejected_alternative: "runtime-discovered subscriber list (no compile-time reserved-key fence)"
    minted: 2026-07-08
  EventSpec.observability_only:
    consumers: [tools/manifest_compile.py, sb/kernel/outbox/enqueue.py]
    rejected_alternative: "a naming convention (*.observed) instead of a declared field"
    minted: 2026-07-08
  EventSpec.audited:
    consumers: [sb/spec/events.py, sb/kernel/outbox/enqueue.py]
    rejected_alternative: "an AuditEventSpec subclass (dropped by spec 08 s3.1 - no consumer, no enforcement)"
    minted: 2026-07-08
  EventSpec.redaction_ref:
    consumers: [sb/spec/events.py, tools/manifest_compile.py]
    rejected_alternative: "per-subscriber ad-hoc scrubbing (the shipped WebhookReporter-only pattern)"
    minted: 2026-07-08
  EventSpec.delivery:
    consumers: [sb/kernel/outbox/enqueue.py, sb/kernel/outbox/relay.py, tools/manifest_compile.py]
    rejected_alternative: "everything at-least-once / everything best-effort (spec 08 fork A options i/ii)"
    minted: 2026-07-08
  FieldSpec.name:
    consumers: [sb/kernel/outbox/enqueue.py, sb/spec/events.py]
    rejected_alternative: "dict-shaped payload schemas (unroleable, untyped)"
    minted: 2026-07-08
  FieldSpec.type:
    consumers: [sb/kernel/outbox/enqueue.py, sb/spec/events.py]
    rejected_alternative: "runtime type sniffing at the codec boundary"
    minted: 2026-07-08
  FieldSpec.required:
    consumers: [sb/kernel/outbox/enqueue.py, sb/spec/events.py]
    rejected_alternative: "treating every payload key as optional (loses the enqueue presence check)"
    minted: 2026-07-08
  StoreSpec.table:
    consumers: [sb/kernel/outbox/store.py, tools/manifest_compile.py]
    rejected_alternative: "inferring table names from module paths"
    minted: 2026-07-08
  StoreSpec.sole_writer:
