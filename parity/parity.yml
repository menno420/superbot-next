          economy_audit_log delta/new_balance rows the same goldens
          gate — goldens/economy/sweep_daily.json +
          goldens/economy/economy_balance_and_daily.json (the
          +1025/+879 daily credits; step 3's wallet card re-reads the
          credited 879 from this very table) — and the table's first
