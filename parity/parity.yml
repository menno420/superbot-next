# A-16 clause 3: kernel/governance-owned surfaces (owned by no port band's
# manifest) get their own coverage home. The surface list is data here so
# the checker stays DB-free. FLIPPED ported with the D-0075 kernel-band
# goldens (parity/goldens/kernel/ — the kernel home's OWN golden dir, never
# a subsystems row): the four mints pin the NEW kernel's spine contract
# (audit_log / event_outbox / command.dispatched bytes, strip inverted) as
# required-green regression tripwires; the uncovered tables carry
# depth.exemptions.kernel rows below. Same one-way door as every flip.
kernel:
  status: ported
  events:
    - audit.action_recorded
    - command.dispatched
  tables:
    - idempotency_keys
    - event_outbox
    - audit_log
    - sb_due_queue
    - sb_drafts
    - sb_quarantine
    - sb_invariant_sweep_log
    - sb_credential_rotation
    - ai_decision_audit

# Corpus-red dispositions (flag 13; ruled ACCEPTED by ORDER 009 / owner
# delegation Q-0262.3, 2026-07-10 — "reversible-on-paper", Q-0240 class).
# Applied at replay-diff time by sb/adapters/parity/dispositions.py to BOTH
# the golden and the fresh capture, symmetrically — every other byte still
# diffs. Decision record: docs/parity/flag-13-disposition-2026-07-10.md.
dispositions:
  kernel-surface-drift:
    encoding: normalizer
    # kernel-owned audit/event surfaces (the `kernel:` coverage home above)
    # are dropped from both docs: the old bot never had them; their coverage
    # obligation lives in the kernel section, not in every band's goldens.
    tables: kernel      # resolve against kernel.tables above
    events: kernel      # resolve against kernel.events above
    # kernel spine columns stamped onto DOMAIN rows — the K idempotency
    # `mutation_id` on the economy ledger row. Same accepted class (the
    # band-3/4 classifications the ruling accepted name "`mutation_id`
    # rows" under kernel drift); the first table-list encoding missed the
    # column form. Every domain byte of the row (delta / new_balance /
    # reason / actor_id) still diffs. Encoding completion 2026-07-10
    # (blackjack flip PR) under the Q-0262.3 delegation — reversible on
    # paper (Q-0240), reviewable at the parity gate.
    columns:
      - economy_audit_log.mutation_id
      # the SAME kernel idempotency column on the karma anti-abuse ledger
      # (sb/domain/karma/store.py insert_karma_audit — the S14
      # ledger-reinsert conflict key, the economy_audit_log twin). Every
      # domain byte of the row (delta / from_user / to_user / reason /
      # source / occurred_at) still diffs. Encoding completion 2026-07-11
      # (karma flip PR) under the Q-0262.3 delegation — reversible on
      # paper (Q-0240), reviewable at the parity gate.
      - karma_audit_log.mutation_id
  xp-coins-alias:
    encoding: normalizer
    # the old `xp.coins` alias column (coins split to economy_balances at
    # the ledgered coins boundary) — the alias column is dropped from xp
    # rows in both docs.
    table: xp
    column: coins
    # the boundary's NEW home: goldens are old-bot captures, so they can
    # never contain an economy_balances row — leaving the new home in the
    # diff made the accepted class self-defeating for every money-mutating
    # golden (first confronted by goldens/blackjack's !daily funding
    # step). Balance BEHAVIOR stays fully pinned: every wallet mutation
    # still diffs through economy_audit_log's delta/new_balance bytes.
    # Encoding completion 2026-07-10 (blackjack flip PR) under the
    # Q-0262.3 delegation — reversible on paper (Q-0240).
    new_home_table: economy_balances
  invoking-message-deletion:
    encoding: exemption
    # the shipped bot deleted the invoking message after every command
    # (reason-less delete_message); v1 deliberately does not. Reason-less
    # delete_message calls are exempt from the replay diff in both docs —
    # reasoned deletes (real moderation/cleanup behavior) still diff.
    method: delete_message
    reasonless_only: true

depth:
  # Closed reason-class vocabulary for exemptions (COVERAGE.md-style; the
  # _sweep_skips honesty pattern). Growing this list is a reviewed schema
  # change, never an inline invention.
  reason_classes:
    - time-driven            # tasks-loop / view-timeout behavior, out of capture scope
    - env-keyed-integration  # AI providers / YouTube / webhooks absent by design
    - settle-budget-race     # provider-health / dataset-scale compute races the settle budget
    - dataset-scale          # golden would embed a pinned bulk dataset
    - extension-management   # mutates the process's cog set mid-run
    - ops-not-behavior       # instance lock / health server / memory sampler class
    - covered-elsewhere      # covered by a named sibling oracle (cite it)
    - kernel-owned           # surface owned by the kernel coverage home above
    - modal-driven           # writes sit behind a Discord modal submission — an
                             # input kind the imported corpus schema does not
                             # carry (cases reconstruct command/slash/click
                             # only), so no golden can drive the write
                             # (vocabulary growth reviewed in the btd6 flip PR,
                             # per the "reviewed schema change" rule above)
    - select-driven          # writes sit behind a run-minted select-menu PICK —
                             # click steps reconstruct STATIC custom_ids only
                             # and carry no component values, and session select
                             # ids normalize to <cid:N> at import (not
                             # reconstructable), so no golden can drive the
                             # write. The D-0063 structural-unreachability test
                             # re-argued for the select ingress (D-0064;
                             # vocabulary growth reviewed in the economy flip
                             # PR, per the "reviewed schema change" rule above)
    - guard-only-capture     # the writing command IS corpus-expressible, but
                             # the imported sweep drove only its BARE/guard
                             # invocation (the sweep enumerated commands
                             # argument-less), so every captured case pins the
                             # refusal/usage byte and the write-bearing ARGFUL
                             # invocation exists in no imported golden; the
                             # first row-bearing golden lands with an argful
                             # capture (vocabulary growth reviewed in the chain
                             # flip PR + decision record D-0069, per the
                             # "reviewed schema change" rule above)
    - seeded-catalog         # the table's rows are minted ONLY by a K3
                             # migration seed (system catalog data, present
                             # BEFORE every case's before-snapshot) and the
                             # ported slice ships NO runtime write ingress —
                             # coverage is measured over per-case db_delta
                             # keys, which structurally cannot carry
                             # pre-seeded rows, so no golden (imported OR
                             # future capture) can ever cover the table; the
                             # class dies for a row the day a runtime write
                             # lane for it ships (vocabulary growth reviewed
                             # in the behavior-preset flip PR + decision
                             # record D-0071, per the "reviewed schema
                             # change" rule above)

  # exemptions:
  #   <subsystem>:
  #     - surface: "event:xp.level_up" | "table:xp" | "setting:xp.enabled"
  #       reason: "<reason-class>: <specifics>"
  exemptions:
    ai:
      # ai's 31 goldens are the READ-ONLY !ai operator surface + the
      # panel opens + the re-homed !aireview review/preset family (the
      # preset write and the review-channel KV write are golden-covered:
      # sweep_aireview_preset_add / sweep_aireview_off).
      - surface: "table:ai_review_log"
        reason: "env-keyed-integration: review-log rows are minted only by
          the NL answer path's failure legs (nl_shell record_unknown on
          provider_unavailable/grounding_failed/no_route_matched outcomes)
          and the 👎/correction reaction lane over the in-memory answer
          registry that only the NL answer path fills — the capture ran
          with AI disabled and the deterministic provider (no NL reply was
          ever attempted: every sweep's ai_decision_audit row is the
          guild_not_configured deny), so no imported golden can carry a
          row; the read surfaces ARE golden-pinned empty-state reads
          (goldens/ai/sweep_aireview{,_list,_export,_resolve}), and the
          table's first row-bearing golden lands with an NL-armed capture"
      # the three typed policy-override tables + their advisory events
      # (the policy-mutation slice, D-0070): the shipped writes sit behind
      # the ChannelPolicyModal/CategoryPolicyModal/RolePolicyModal submits
      # reached ONLY through run-minted scope-picker select picks
      # (views/ai/policy/{channel,category,role}_view.py @7f7628e1 — the
      # views never exposed a command twin), so the corpus is doubly
      # unable to express the ingress (D-0063 modal + D-0064 select); the
      # D-0063 structural-unreachability test re-argued for THESE tables:
      # no command/slash/click reconstruction can carry the upsert, and
      # the events fire only on those writes. The read surfaces ARE
      # golden-pinned (the sweep_ai_policy dual dry-run trace reads the
      # resolver these rows feed; the chooser open is byte-pinned by the
      # #160 skeleton).
      - surface: "table:ai_channel_policy"
        reason: "modal-driven: written only by the ai.policy_mode_form
          submit behind the channel scope-picker pick (D-0063 re-argued;
          no command twin shipped)"
      - surface: "table:ai_category_policy"
        reason: "modal-driven: written only by the ai.policy_mode_form
          submit behind the category scope-picker pick (D-0063 re-argued;
          no command twin shipped)"
      - surface: "table:ai_role_policy"
        reason: "modal-driven: written only by the ai.policy_role_form
          submit behind the role scope-picker pick (D-0063 re-argued;
          no command twin shipped)"
      - surface: "event:ai.policy.channel_changed"
        reason: "modal-driven: emitted only by the ai.set_channel_policy
          op the ai.policy_mode_form submit runs (same ingress argument
          as its table row)"
      - surface: "event:ai.policy.category_changed"
        reason: "modal-driven: emitted only by the ai.set_category_policy
          op the ai.policy_mode_form submit runs (same ingress argument
          as its table row)"
      - surface: "event:ai.policy.role_changed"
        reason: "modal-driven: emitted only by the ai.set_role_policy
          op the ai.policy_role_form submit runs (same ingress argument
          as its table row)"
      # the instruction-profile catalog (the behavior-preset slice,
      # D-0071): migration 0030 seeds the seven shipped system presets
      # (oracle migrations 039/043/044) and the slice ships NO runtime
      # write lane for the table — the preset pick's WRITE lands on
      # ai_channel_policy / ai_category_policy (instruction_profile_id,
      # rows already exempted above), and guild-authored profiles (the
      # oracle ai_instruction_mutation surface) are unported. The read
      # surface is live (the preset picker options/fields).
      - surface: "table:ai_instruction_profile"
        reason: "seeded-catalog: rows exist only as the migration-0030
          system seed — they precede every case's before-snapshot, so a
          per-case db_delta structurally cannot carry them, and no
          runtime ingress (command/slash/click/modal, ported or shipped)
          writes the table; the row dies when a guild-authored
          profile-mutation lane ships (D-0071)"
      # the tool-orchestration advisory events (the orchestration-mutation
      # slice, D-0072): the shipped writes sit behind run-minted PROFILE
      # select picks (views/ai/tools/scope_view.py _ProfileSelect — the
      # tools chooser exposed NO command twin), and D-0064's
      # structural-unreachability test is re-argued per row: a session
      # select pick carries the profile-key VALUE the imported click
      # schema does not (cases reconstruct static custom_ids only) and
      # the run-minted select ids normalize to <cid:N> at import, so no
      # golden can drive the write. The tables the channel/category
      # writes land on (ai_channel_policy / ai_category_policy) are
      # already exempted above; the guild write's KV home rides the
      # kernel-owned guild_settings coverage.
      - surface: "event:ai.orchestration.guild_changed"
        reason: "select-driven: emitted only by the
          ai.set_guild_orchestration op the tools guild-picker's
          run-minted profile-select PICK runs (D-0064 re-argued; no
          command twin shipped)"
      - surface: "event:ai.orchestration.channel_changed"
        reason: "select-driven: emitted only by the
          ai.set_channel_orchestration op the tools profile-select PICK
          runs behind the channel scope pick (D-0064 re-argued; no
          command twin shipped)"
      - surface: "event:ai.orchestration.category_changed"
        reason: "select-driven: emitted only by the
          ai.set_category_orchestration op the tools profile-select PICK
          runs behind the category scope pick (D-0064 re-argued; no
          command twin shipped)"
    # btd6's `table:btd6_strategies` modal-driven row (the class's birth
    # row, D-0063) was DELETED by its own deletion clause in the D-0073
    # slice: the corpus schema grew the `modal` input kind, the shipped
    # StrategySubmitModal twin went live (btd6.strategy_form), and the
    # minted goldens/btd6/btd6_strategy_form_submit{,_minimal}.json now
    # CARRY the insert — the ratchet climbed (btd6 tables 3 → 4). The
    # `modal-driven` class itself stays (the ai rows above still ride it).
    chain:
      # chain's seven goldens are guard/usage bytes + the Chain Manager
      # empty-state open — the sweep drove every `!chain` subcommand
      # BARE, so each captured case pins its refusal/usage reply and no
      # chain was ever created in the capture world.
      - surface: "table:chain_channels"
        reason: "guard-only-capture: the writing commands are
          corpus-expressible (`!chain create [channel] <word>` /
          `setlimit <n>`) but the imported sweep drove only their bare
          invocations — every captured case pins the guard byte the
          flipped row now answers verbatim (goldens/chain/
          sweep_chain_create '❌ Please specify the word…',
          sweep_chain_setlimit '❌ Please specify a valid word limit…',
          sweep_chain_delete/sweep_chain_removelimit the no-chain
          branches, sweep_chainmenu the empty-state manager), so no
          imported golden can carry a chain_channels row; the shipped
          panel write lane is additionally modal-driven (the
          _CreateChainModal quartet, D-0063's ingress) and the table's
          first row-bearing golden lands with an argful capture
          (decision record D-0069)"
    # cleanup's table:prohibited_words covered-elsewhere exemption
    # RETIRED (the #193 precedent: retire when coverage becomes
    # first-class) — the word-family re-home moved sweep_word_add onto
    # the cleanup row, so its `!word add test` prohibited_words db_delta
    # row now covers the table on the row itself.
    counting:
      # counting's three goldens are read/render surfaces (the two
      # guard-byte reads + the Counting Manager inactive-state open) —
      # the capture guild never had an active counting channel, so
      # every state-touching sweep pinned the "Counting game is not set
      # up for this channel." refusal (goldens/counting/sweep_count_info
      # + sweep_counttop; the sibling _unmapped sweep_reset_count +
      # sweep_toggle_reset_on_wrong_count pin the same guard byte).
      - surface: "table:counting_state"
        reason: "select-driven: the only capture-reachable write ingress
          is the Counting Manager's run-minted Enable-Here mode pick
          (the shipped _ModePick whitelist flow — D-0064: session select
          PICKS carry values the click schema lacks and the run-minted
          ids normalize to <cid:N>); the command ingresses the corpus
          schema could express either provision a fresh Discord channel
          first (!start_match — the create-channel capture wall, the
          D-0030/trap-17 class; never swept into the imported corpus)
          or mutate only an already-active channel no capture case
          establishes (!end_match/!reset_count/!toggle_* — the pinned
          not-set-up refusal bytes above), so no imported golden can
          carry a counting_state row; the table's first row-bearing
          golden lands with a state-seeded capture"
    creature:
      # creature's six goldens are the hub open, the challenge open and
      # the four embed cards over the never-seeded capture guild — every
      # card pins the ZERO-ROW epoch of the two declared tables from the
      # read side (sweep_dex '0/36 discovered', the re-homed sweep_dextop
      # 'No one has been catching yet', sweep_creatures 'Your progress
      # 0/36', sweep_cbrecord '0W/0L/—', sweep_cbattletop 'No battles won
      # yet'); neither write lane ever ran in the capture world.
      - surface: "table:creature_collection_log"
        reason: "env-keyed-integration: the table's only writers are the
          catch lane's two ingresses — the `!catch` command the imported
          sweep EXCLUDED by design (parity/goldens/_sweep_skips.json
          'catch': 'unseeded private RNG in creature spawn selection' —
          the capture harness's determinism posture, the ai_review_log
          deterministic-provider precedent: the capture environment by
          design never ran the writer) and the hub's run-minted Catch
          button (a session <cid:N> id no imported click step can
          reconstruct), so no imported golden can carry a
          creature_collection_log row; the read surfaces ARE
          golden-pinned empty-state reads (goldens/creature/sweep_dex +
          sweep_creatures + the re-homed sweep_dextop), and the table's
          first row-bearing golden lands with a seeded-RNG capture"
      - surface: "table:creature_battle_record"
        reason: "time-driven: battle rows are written only at PvP
          resolution inside the shipped challenge orchestration (the
          run-minted Accept/Decline timeout view,
          disbot/views/creature_battle/challenge.py — the rps_players
          precedent verbatim: match/battle completion inside an
          interactive session view is out of capture scope for the sweep
          corpus); the goldens open a challenge and finish no battle
          (goldens/creature/sweep_cbattle) and pin the record lane's
          empty-state reads (sweep_cbrecord + sweep_cbattletop), so no
          imported golden can carry a creature_battle_record row; the
          first row-bearing golden lands with a battle-completing
          capture"
    economy:
      # economy's six goldens pin the read/menu/claim lane (the daily K7
      # write + economy/economy_audit_log deltas + the hub/jobcenter/
      # wallet wire bytes); the work/buy K7 writes sit behind the two
      # session dropdowns, and the coins column moved home at the
      # ledgered-coins boundary.
      # NOT covered-elsewhere: no golden corpus-wide carries an
      # economy_balances db_delta (the #145 codex ruling — when no
      # imported golden CAN carry the table, the ground is structural
      # absence, not a sibling). Here the absence is the capture
      # SCHEMA EPOCH: the table is the ledgered-coins boundary's NEW
      # home (xp-coins-alias disposition above, new_home_table).
      - surface: "table:economy_balances"
        reason: "env-keyed-integration: economy_balances is the
          ledgered-coins boundary's NEW home — the capture world's
          schema stored coins on the shipped xp.coins alias by DESIGN
          (the xp-coins-alias disposition above documents exactly this:
