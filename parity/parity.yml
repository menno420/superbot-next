      # carries a guild_treasury row (the `!treasury grant` disburse lane
      # is staff-tier and outside the sweep's member/admin persona pair
      # entirely).
      - surface: "table:guild_treasury"
        reason: "guard-only-capture: the writing command is
          corpus-expressible (`!treasury contribute <amount>`,
          goldens/treasury/sweep_treasury_contribute.json) but the
          imported sweep's admin persona held 0 🪙, so the captured case
          pins the insufficient-funds guard byte ('🏛️ Contributing **3**
          🪙 is more than your **0** 🪙.') and no imported golden can carry
          the row; the first row-bearing golden lands with a
          funded-persona capture"
    xp:
      # the xp-admin re-home moved the reset lane's own oracle
      # (sweep_resetxp — the xp.reset event verbatim) onto this row, so
      # the former event:xp.reset covered-elsewhere exemption is RETIRED:
