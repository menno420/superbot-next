# parity/parity.yml — the golden-parity gate manifest (design-spec §6 gate 5)
# + the A-16 parity-depth section (carried in this schema FROM BIRTH, per the
# canonical plan §11b A-16: "parity.yml … does not exist yet — adding its depth
# section now costs nothing").
#
# Semantics (design-spec §6 gate 5, verbatim contract):
#   - every subsystem is listed as `pending | ported`;
#   - `ported` subsystems run their goldens against a real Postgres service
#     container in CI and MUST be green — any regression is a hard failure;
#   - `pending` subsystems are expected-red and *reported*, not failing;
#   - flipping `pending -> ported` is the port PR's deliberate LAST commit,
#     and green is a one-way door (a `ported` row never flips back);
#   - this file doubles as the owner's live port-progress dashboard.
#
# A-16 depth floor (enforced by tools/check_parity_depth.py inside the
# golden-parity gate — no 7th gate):
#   1. floor at the flip — a `ported` subsystem needs 100% declared-surface
#      touch coverage (every manifest-declared event / store table / setting
#      key exercised by >=1 golden) OR a per-surface `exempt` row below, whose
#      reason MUST begin with a reason class from `depth.reason_classes`
#      (never a bare "flaky");
#   2. count-ratchet after the flip — covered-surface counts never decrease
#      (`depth.ratchet` is the committed floor; regenerate it upward in the
#      same PR that adds coverage);
#   3. kernel/governance-owned surfaces get their own coverage home — the
#      `kernel` section below — so they don't silently escape every band's
#      floor;
#   4. the design-spec §10.1 per-flip coverage NOTE (uncovered *flows*) stays
#      the judgment layer; this floor is a floor, not the definition of depth.
#
# Provenance: the golden corpus was imported VERBATIM (byte-identical) from
# the frozen reference repo. A golden changes only via an explicit, reviewed
# PR with the diff explained (parity/README.md integrity rule).

