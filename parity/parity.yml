  hermes: pending
  image_moderation: pending
  inventory: pending
  karma: pending
  leaderboard: pending
  logging: pending
  mining: pending
  moderation: pending
  project_moon: pending
  projectmoon: pending
  proof_channel: pending
  quicksetup: pending
  role: pending
  rps_tournament: ported
  security: pending
  server_management: pending
  servermanagement: pending
