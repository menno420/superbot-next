      # chicken_farm row; none of the three K7 money lanes ever ran in
      # the capture world.
      - surface: "table:chicken_farm"
        reason: "time-driven: chicken_farm rows are written only at
          interactive-session resolution — the three audited K7 lanes
          (farm.collect / farm.buy_chicken / farm.upgrade_coop) sit
          behind the hub's run-minted Collect/Shop buttons (session
          <cid:N> ids no imported click step can reconstruct;
          disbot/views/farm/menu.py FarmMenuView/FarmShopView — the
          creature_battle_record / rps_players precedent: writes inside
          an interactive session view are out of capture scope for the
          sweep corpus); the read surface IS golden-pinned
          (goldens/farm/sweep_farm.json pins the fresh-farmer
          starter-defaults read — 1 hen · 0/20 eggs · level-0 coop, no
          row), so no imported golden can carry a chicken_farm row; the
          first row-bearing golden lands with a button-driving capture"
    games:
      # games' four goldens are the read/render hub family (the 🎮 hub
      # prefix+slash pair + the re-homed 🗺️ Explore hub + 🪪 world card)
      # — the row owns the band-6 SUBSTRATE (the game_state checkpoint
      # store, the shared game_xp track, the guild_settings tournament
      # flag) whose write lanes run inside the CHILD game subsystems;
      # its own surfaces are read-only opens.
      - surface: "table:game_state"
        reason: "covered-elsewhere: the checkpoint store's write bytes
          are pinned by the sibling blackjack oracles (goldens/blackjack/
          sweep_blackjack.json + blackjack_solo_round_hit.json carry the
          game_state row — the shipped checkpoint the substrate persists
          for every session game) and replay green through the PORTED
          blackjack row; the games goldens are read-only panel opens"
      - surface: "table:game_xp"
        reason: "covered-elsewhere: the shared-track write bytes are
          pinned by the named sibling mining-lane oracles
          (goldens/_unmapped/sweep_fastmine.json / sweep_chop.json /
          sweep_explore.json each carry a game_xp row — the shipped
          award lane the substrate owns), pending their mining-band
          re-home (the settings table:subsystem_bindings precedent:
          the cited sibling pins the bytes from the _unmapped set); the
          games goldens are read-only panel opens and the world card's
          zero-XP empty state pins the table's no-row epoch from the
          read side (goldens/games/sweep_worldcard)"
      - surface: "table:guild_settings"
        reason: "covered-elsewhere: the tournament-flag KV rides the
          shared shipped guild_settings table whose write bytes are
          pinned by the sibling oracle goldens/rps_tournament/
          sweep_rpsregister.json (the active_tournament row — the very
          key the games TOURNAMENT_FLAG_STORE declares) and replay
          green through the PORTED rps_tournament row (the settings
          table:settings precedent verbatim)"
      - surface: "event:game_xp.awarded"
        reason: "covered-elsewhere: the advisory fires only from the
          audited game-XP award lane (sb/domain/games/xp.award_in_txn),
          whose write bytes are pinned by the named sibling oracles
          above (sweep_fastmine / sweep_chop / sweep_explore game_xp
          rows); the shipped bot published no tap-able bus event on
          those flows, so no imported golden can carry the event — its
          first live golden lands with the mining-band flip (the
          settings.changed / xp.level_up unreachable-surface precedent)"
      - surface: "event:game_xp.level_up"
        reason: "covered-elsewhere: the advisory fires only from the
          same award lane when the derived level crosses a threshold —
          every capture awarded single-digit game XP at level 0 (the
          sibling game_xp rows above pin xp<=4), and the shipped bot
          published no tap-able bus event at all, so no imported golden
          can carry the event; its first live golden lands with a
          threshold-crossing mining-band capture (the xp.level_up
          precedent verbatim)"
    # KERNEL — the A-16 clause-3 coverage home's own floor (D-0075): the
    # kernel-band goldens (goldens/kernel/) cover audit_log + event_outbox
    # + both kernel events; the remaining kernel tables have NO
    # capture-reachable interaction ingress in this schema epoch — their
    # writers are the kernel's un-armed task/ops lanes (none is wired into
    # the composition root's SUBSCRIBE_ROSTER/task set yet), so no golden
    # (imported or minted) can carry a row. Each row dies when its lane
    # arms with an interaction- or capture-reachable writer.
    kernel:
      - surface: "table:idempotency_keys"
        reason: "ops-not-behavior: no domain op rides DURABLE_ONCE in this
          schema epoch (every CompoundOpSpec is NATURAL_KEY — grep
          idempotency= across sb/domain), so the engine's once() guard
          never writes; the table's only writers are the kernel's own
          task/ops lanes (due-queue claims, invariant sweep, credential
          rotation, privacy erasure — sb/kernel/db/idempotency.py
          callers), none armed at the composition root; op-level dedup
          BEHAVIOR is pinned via audit_log's mutation_id conflict key on
          the kernel-band goldens"
      - surface: "table:sb_due_queue"
        reason: "time-driven: due-queue rows are minted by the K8
          scheduler's task lane (sb/kernel/scheduler/due_queue.py), a
          tasks-loop surface out of capture scope — no interaction
          ingress writes it"
      - surface: "table:sb_drafts"
        reason: "ops-not-behavior: the K9 draft pipeline (Final Review /
          rung-4 orchestration staging, sb/kernel/draft/) is an
          owner-approval ops surface with no armed interaction ingress in
          this epoch — nothing at the composition root stages a draft"
      - surface: "table:sb_quarantine"
        reason: "time-driven: quarantine rows are written only by the S12
          invariant sweep's soft-quarantine leg
          (sb/kernel/invariants/sweep.py), a tasks-loop surface out of
          capture scope"
      - surface: "table:sb_invariant_sweep_log"
        reason: "time-driven: sweep-log rows are written only by the S12
          invariant sweep loop (sb/kernel/invariants/sweep.py), out of
          capture scope"
      - surface: "table:sb_credential_rotation"
        reason: "ops-not-behavior: rotation rows are written only by the
          spec-12 credential-rotation cadence
          (sb/kernel/credentials/), an ops lane never driven by an
          interaction"
      - surface: "table:ai_decision_audit"
        reason: "env-keyed-integration: decision-audit rows are minted by
          the NL routing lane, which runs unarmed in the capture/replay
          world (AI disabled + deterministic provider; the live-NL leg is
          key-gated — OWNER-ACTION 5), so no kernel-band mint can carry a
          row; the imported corpus's old-bot deny rows are dropped by the
          kernel-surface-drift disposition, and the table's first
          row-bearing golden lands with an NL-armed capture (the
          ai_review_log precedent verbatim)"
    proof_channel:
      # proof_channel's three goldens (and the sibling _unmapped prize
      # sweeps) all pin the shipped "#proof not found" guard — the
      # capture guild carried no #proof channel and no proof_channel
      # binding (oracle schemas.py declares the `proof` resource
      # OPTIONAL), so the lock-write lane behind the guard never ran in
      # the capture world. NOT covered-elsewhere: no golden corpus-wide
      # carries a proof_channel_locks db_delta (codex review on #145) —
      # the exemption's ground is the capture ENVIRONMENT, not a sibling.
      - surface: "table:proof_channel_locks"
        reason: "env-keyed-integration: the lock write requires the
          #proof channel / proof_channel binding, a guild resource the
          sweep capture environment carried by DESIGN not at all (only
          the harness's #general) — every prize-family capture stopped
          at the shipped not-found guard, whose bytes ARE pinned
          (goldens/proof_channel/sweep_timedprize.json +
          goldens/_unmapped/sweep_+prize.json / sweep_-prize.json), so
          no imported golden can carry a lock row; the table's first
          live golden lands with a #proof-provisioned capture alongside
          the channel-ops slice"
    rps_tournament:
      - surface: "table:rps_players"
        reason: "time-driven: rps_players stats rows are written at match
          completion inside the shipped tournament/bot-match orchestration
          (reaction sign-up + stage loops + no-prefix moves in match
          channels) — out of capture scope for the sweep corpus; the
          subsystem's only golden opens the quick-play picker and finishes
          no match"
    role:
      # role's goldens are the hub opens + the re-homed sweep family
      # (the #155-lane re-home: sweep_setrole / sweep_reactroles now
      # carry the role_thresholds / reaction_roles rows IN-DIRECTORY —
      # their two covered-elsewhere exemption rows are RETIRED); the
      # remaining write lanes sit behind the shipped INTERACTIVE
      # reaction-roles surfaces (the PR-2 menu builder / manager views —
      # select picks the corpus click schema cannot express, D-0064).
      - surface: "table:role_grants"
        reason: "guard-only-capture: the grant lane's only capture sweep
          (goldens/role/sweep_temprole.json, `!temprole <@member>
          test <@&role>`) drove an unparseable duration token, so the
          shipped parse guard answered and no grant row was written —
          no imported golden corpus-wide carries the table (D-0069's
          structural test: the capture drive reaches only the guard; a
          future valid-duration capture sweep deletes this row)"
      - surface: "table:role_menus"
        reason: "select-driven: menu config rows are written only through
          the shipped interactive menu BUILDER (the reaction-roles
          overhaul's PR-2 builder — role/theme/template one-tap PICKERS,
          disbot/utils/role_menu_presentation.py) — run-minted selects
          whose picked VALUES the corpus click schema does not carry
          (D-0064, the D-0063 test re-argued per ingress); no imported
          golden corpus-wide carries the table"
      - surface: "table:role_menu_options"
        reason: "select-driven: option rows are written in the same
          builder transaction as their role_menus parent (the role
          picker's selected values) — D-0064, the role_menus row's
          ground verbatim; no imported golden corpus-wide carries the
          table"
      - surface: "table:role_menu_pickup_stats"
        reason: "select-driven: pickup rows are recorded when a member
          picks a role from a PUBLISHED menu's dropdown
          (views/roles/role_menu_view.py RoleMenuView) — a select pick
          on a menu message that itself cannot exist in the harness
          world (its parent role_menus row is select-driven above);
          D-0064; no imported golden corpus-wide carries the table"
      - surface: "table:reaction_role_message_modes"
        reason: "select-driven: the per-message mode (normal/unique/
          verify) is set through the shipped reaction-roles manager
          view's mode picker — a run-minted select whose value the
          click schema does not carry (D-0064); no imported golden
          corpus-wide carries the table"
      - surface: "table:role_automation_exemptions"
        reason: "select-driven: exemption rows are written through the
          shipped Exemptions panel's role picker (the set_role_exemption
          audit lane) — a run-minted role select whose value the click
          schema does not carry (D-0064); no imported golden
          corpus-wide carries the table"
    settings:
      # settings owns the SHARED K7 config lane (band 1): its stores/event
      # are written through the four scalar/binding ops that OTHER
      # subsystems' config commands drive — the settings directory's own
      # four goldens are read-only panel opens (hub + explorer); the
      # mutation pages are the settings-mutation slice's port.
      - surface: "table:settings"
        reason: "covered-elsewhere: the K7 scalar lane's write bytes are
          pinned by sibling config-write oracles (goldens/rps_tournament/
          sweep_rpsregister.json carries the shipped scalar write's
          guild_settings row and replays green through the PORTED
          rps_tournament row); the settings goldens are read-only panel
          opens"
      - surface: "table:subsystem_bindings"
        reason: "covered-elsewhere: the K7 binding lane's write bytes are
          pinned by the sibling oracle goldens/_unmapped/
          sweep_setlogchannel.json (subsystem_bindings +
          binding_audit_log rows — the shipped logging bind flow); the
          settings goldens are read-only panel opens"
      - surface: "event:settings.changed"
        reason: "covered-elsewhere: the advisory fires only from the four
          K7 scalar/binding ops, whose write bytes are pinned by the named
          sibling oracles above (sweep_rpsregister / sweep_setlogchannel);
          the shipped bot published no tap-able bus event on those flows,
          so no imported golden can carry the event — its first live
          golden lands with the first config-write flip (logging)"
    starboard:
      # starboard's six goldens pin the config command family over the
      # UNCONFIGURED capture guild: the ignore write IS golden-covered
      # (sweep_starboard_ignore carries the starboard_ignore_channels
      # row), but no capture ever configured the board itself.
      - surface: "table:starboard_settings"
        reason: "guard-only-capture: the writing command is
          corpus-expressible (`!starboard #channel [threshold]` — the
          audited starboard.configure upsert) but the imported sweep
          drove only the bare invocation — goldens/starboard/
          sweep_starboard pins the off-status guard byte the flipped row
          answers verbatim, and the sibling sweeps pin the table's
          no-row epoch from the write side (sweep_starboard_off +
          sweep_starboard_selfstar: the shipped pure-UPDATE flips
          matched zero rows over the unconfigured capture guild — ack +
          audit with an EMPTY domain delta), so no imported golden can
          carry a starboard_settings row; the panel write lane is
          additionally select/modal-driven (the config panel's
          channel-pick configure + threshold modal, D-0064/D-0063's
          ingresses) and the table's first row-bearing golden lands
          with an argful capture (decision record D-0069)"
    treasury:
      # treasury's two goldens are the panel open (sweep_treasury, an empty
