# ci.yml — the committed-checker fleet + unit tests + the S13 supply-chain
# gates (frozen L0 spec 12 §2.C / Q-D18).
#
# OWNER STEP (flagged, not self-applied): designating these jobs as REQUIRED
# status checks is a repo-Settings action (build-brief §8.1). This file only
# authors the jobs.
#
# The unit suite runs WITHOUT the runtime deps installed — the kernel's
# guarded-import discipline is itself under test (asyncpg/aiohttp/discord/
# croniter absent => fakes + skip-if-absent paths). The lockfile/audit jobs
# exercise the pinned set separately.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test tooling (no runtime deps — guarded-import discipline)
        run: pip install pytest pyyaml
      - name: Unit tests
        run: python3 -m pytest tests/ -q

  checkers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyyaml
      - name: Manifest compile (recompile-parity verify)
        run: python3 tools/manifest_compile.py
      - name: Committed checker fleet
        run: |
          set -e
          for checker in \
            check_amendments check_config_usage check_cost_posture \
            check_credential_lifecycle check_data_lifecycle \
            check_doc_cites check_egress \
            check_escape_hatches check_intent_survival check_lockfile_fresh \
            check_metric_cardinality check_migrations check_money_race \
            check_namespace \
            check_no_skip check_orphan_pendings \
            check_rollback_disposition check_runtime_smoke \
            check_schema_growth check_settle_once \
            check_sim_gate check_slash_cap check_symbol_shadowing \
            check_verified_live; do
            echo "::group::${checker}"
            python3 "tools/${checker}.py"
            echo "::endgroup::"
          done
      - name: Kit check --strict
        # Explicit nonexistent sentinel: card grading here is a
        # deterministic advisory skip (bootstrap.py check docs — an
        # explicit absent --session-log never falls back to another
        # card). Without it the engine guesses newest-by-mtime, which
        # a fresh CI checkout flattens, grading an arbitrary card.
        # Session-card ENFORCEMENT is owned by substrate-gate.yml,
        # which derives the card(s) from the PR diff.
        run: python3 bootstrap.py check --strict --session-log .sessions/__no-card-in-diff__.md

  lockfile-fresh:
    # spec 12 §2.C: regenerating the lock from requirements.txt yields no
    # diff and every entry is hash-pinned (the full --regen leg; the static
    # leg already ran in the checkers job).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-tools
      - run: python3 tools/check_lockfile_fresh.py --regen

  pip-audit:
    # spec 12 §2.C: scan the RESOLVED lock against the advisory DB (S-3).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - name: Audit the resolved lock
        run: pip-audit -r requirements.lock --require-hashes --disable-pip

  build-image:
    # Deploy-packaging smoke: build the container image on every PR so a broken
    # Dockerfile (or a stale/unhashable requirements.lock) is caught here, not
    # at release time. Build only — the image is NOT pushed. NOT a required
    # check (the merge ruleset is fixed); the release workflow owns tag+push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: superbot-next:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
